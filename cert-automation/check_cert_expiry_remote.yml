---
- name: Check TLS Certificate Expiry via Remote Connection
  hosts: localhost
  gather_facts: yes
  vars:
    cert_warning_days: 30
    endpoints:
      - name: "Apache RHEL9"
        host: "test.sdunne.net"
        port: 443
      - name: "Windows IIS"
        host: "test1.sdunne.net"
        port: 443

  tasks:
    - name: Ensure openssl is available
      package:
        name: openssl
        state: present
      become: yes
      when: ansible_os_family == "RedHat" or ansible_os_family == "Debian"

    - name: Check certificate expiry for each endpoint
      shell: |
        echo | openssl s_client -servername {{ item.host }} -connect {{ item.host }}:{{ item.port }} 2>/dev/null | openssl x509 -noout -dates -subject -issuer
      register: cert_check
      loop: "{{ endpoints }}"
      failed_when: false

    - name: Parse certificate information
      set_fact:
        cert_details: >-
          {{
            cert_details | default([]) +
            [{
              'name': item.item.name,
              'host': item.item.host,
              'output': item.stdout,
              'reachable': item.rc == 0
            }]
          }}
      loop: "{{ cert_check.results }}"

    - name: Get detailed certificate expiry
      shell: |
        echo | openssl s_client -servername {{ item.host }} -connect {{ item.host }}:{{ item.port }} 2>/dev/null | openssl x509 -noout -enddate | cut -d= -f2
      register: cert_expiry
      loop: "{{ endpoints }}"
      when: item.host is defined
      failed_when: false

    - name: Calculate days until expiry
      shell: |
        EXPIRY_DATE="{{ item.stdout }}"
        EXPIRY_EPOCH=$(date -d "$EXPIRY_DATE" +%s)
        CURRENT_EPOCH=$(date +%s)
        DAYS_REMAINING=$(( ($EXPIRY_EPOCH - $CURRENT_EPOCH) / 86400 ))
        echo $DAYS_REMAINING
      register: days_calc
      loop: "{{ cert_expiry.results }}"
      when:
        - item.rc is defined
        - item.rc == 0
      failed_when: false

    - name: Display certificate information
      debug:
        msg: |
          Endpoint: {{ item.item.item.name }}
          Host: {{ item.item.item.host }}:{{ item.item.item.port }}
          Expiry Date: {{ item.item.stdout }}
          Days Remaining: {{ item.stdout }}
          Status: {{ 'WARNING - Expires Soon!' if (item.stdout | int) < cert_warning_days else 'OK' }}
      loop: "{{ days_calc.results }}"
      when:
        - item.rc is defined
        - item.rc == 0

    - name: Alert on expiring certificates
      debug:
        msg: "⚠️  WARNING: {{ item.item.item.name }} certificate expires in {{ item.stdout }} days!"
      loop: "{{ days_calc.results }}"
      when:
        - item.rc is defined
        - item.rc == 0
        - (item.stdout | int) < cert_warning_days

    - name: Generate summary report
      copy:
        content: |
          Certificate Expiry Report
          Generated: {{ ansible_date_time.iso8601 }}
          ==========================================

          {% for item in days_calc.results %}
          {% if item.rc == 0 %}
          Endpoint: {{ item.item.item.name }}
          Host: {{ item.item.item.host }}:{{ item.item.item.port }}
          Expiry Date: {{ item.item.stdout }}
          Days Remaining: {{ item.stdout }}
          Status: {{ 'CRITICAL - EXPIRES SOON' if (item.stdout | int) < cert_warning_days else 'OK' }}
          ---
          {% endif %}
          {% endfor %}
        dest: "./cert_expiry_report_{{ ansible_date_time.date }}.txt"
      delegate_to: localhost
