---
- name: Diagnose IIS HTTPS issue
  hosts: windows_servers
  gather_facts: false
  vars:
    domain_name: "{{ iis_domain_name | default('test1.sdunne.net') }}"
    site_name: "{{ iis_site_name | default('DefaultWebSite') }}"

  vars_files:
    - secrets.yml

  tasks:
    - name: Check IIS service status
      ansible.windows.win_service_info:
        name: W3SVC
      register: iis_service

    - name: Display IIS service status
      ansible.builtin.debug:
        msg: "IIS Service (W3SVC): {{ iis_service.services[0].state }} ({{ iis_service.services[0].start_mode }})"

    - name: Check what's listening on port 443
      ansible.windows.win_powershell:
        script: |
          $listeners = Get-NetTCPConnection -LocalPort 443 -ErrorAction SilentlyContinue
          if ($listeners) {
            $Ansible.Result = @{
              listening = $true
              count = $listeners.Count
              processes = @($listeners | ForEach-Object {
                $proc = Get-Process -Id $_.OwningProcess -ErrorAction SilentlyContinue
                if ($proc) { $proc.ProcessName } else { "Unknown" }
              } | Select-Object -Unique)
            }
          } else {
            $Ansible.Result = @{
              listening = $false
              count = 0
            }
          }
      register: port_443

    - name: Display port 443 status
      ansible.builtin.debug:
        msg: |
          Port 443 Status:
            Listening: {{ port_443.result.listening }}
            Connections: {{ port_443.result.count | default(0) }}
            Processes: {{ port_443.result.processes | default([]) | join(', ') }}

    - name: Get all IIS sites
      ansible.windows.win_powershell:
        script: |
          Import-Module WebAdministration
          $sites = Get-Website | ForEach-Object {
            @{
              name = $_.Name
              state = $_.State
              id = $_.Id
              physicalPath = $_.PhysicalPath
            }
          }
          $Ansible.Result = @{ sites = $sites }
      register: all_sites

    - name: Display all IIS sites
      ansible.builtin.debug:
        msg: "{{ all_sites.result.sites }}"

    - name: Get detailed bindings for our site
      ansible.windows.win_powershell:
        script: |
          Import-Module WebAdministration
          $siteName = "{{ site_name }}"

          $site = Get-Website -Name $siteName
          if (-not $site) {
            throw "Site $siteName not found"
          }

          $bindings = Get-WebBinding -Name $siteName | ForEach-Object {
            $info = @{
              protocol = $_.protocol
              bindingInformation = $_.bindingInformation
              sslFlags = $_.sslFlags
            }

            if ($_.protocol -eq "https") {
              $info.certificateHash = $_.certificateHash
              $info.certificateStoreName = $_.certificateStoreName
            }

            $info
          }

          $Ansible.Result = @{
            site_name = $site.Name
            site_state = $site.State
            site_id = $site.Id
            bindings = $bindings
          }
      register: site_info

    - name: Display site bindings
      ansible.builtin.debug:
        msg: "{{ site_info.result }}"

    - name: Check certificates in store
      ansible.windows.win_powershell:
        script: |
          $certs = Get-ChildItem -Path Cert:\LocalMachine\My | ForEach-Object {
            @{
              thumbprint = $_.Thumbprint
              subject = $_.Subject
              issuer = $_.Issuer
              friendly_name = $_.FriendlyName
              has_private_key = $_.HasPrivateKey
              not_after = $_.NotAfter.ToString("yyyy-MM-dd HH:mm:ss")
              dns_names = @($_.DnsNameList.Unicode)
            }
          }
          $Ansible.Result = @{ certificates = $certs }
      register: all_certs

    - name: Display all certificates
      ansible.builtin.debug:
        msg: "{{ all_certs.result.certificates }}"

    - name: Check firewall rules for HTTPS
      ansible.windows.win_powershell:
        script: |
          $rules = Get-NetFirewallRule -DisplayName "*HTTPS*" -ErrorAction SilentlyContinue
          $result = @()

          foreach ($rule in $rules) {
            $portFilter = Get-NetFirewallPortFilter -AssociatedNetFirewallRule $rule
            $result += @{
              name = $rule.DisplayName
              enabled = $rule.Enabled
              direction = $rule.Direction
              action = $rule.Action
              localPort = $portFilter.LocalPort
            }
          }

          $Ansible.Result = @{ rules = $result }
      register: firewall_rules

    - name: Display firewall rules
      ansible.builtin.debug:
        msg: "{{ firewall_rules.result.rules }}"

    - name: Test local HTTPS connection
      ansible.windows.win_powershell:
        script: |
          try {
            [System.Net.ServicePointManager]::ServerCertificateValidationCallback = {$true}
            $response = Invoke-WebRequest -Uri "https://localhost" -UseBasicParsing -TimeoutSec 5
            $Ansible.Result = @{
              success = $true
              status_code = $response.StatusCode
            }
          } catch {
            $Ansible.Result = @{
              success = $false
              error = $_.Exception.Message
            }
          }
      register: local_test

    - name: Display local HTTPS test
      ansible.builtin.debug:
        msg: |
          Local HTTPS Test (https://localhost):
            Success: {{ local_test.result.success }}
            {% if local_test.result.success %}
            Status Code: {{ local_test.result.status_code }}
            {% else %}
            Error: {{ local_test.result.error }}
            {% endif %}

    - name: Check IIS logs for errors
      ansible.windows.win_powershell:
        script: |
          $logPath = "C:\inetpub\logs\LogFiles"
          if (Test-Path $logPath) {
            $latestLog = Get-ChildItem -Path $logPath -Recurse -File |
                         Sort-Object LastWriteTime -Descending |
                         Select-Object -First 1
            if ($latestLog) {
              $content = Get-Content $latestLog.FullName -Tail 20
              $Ansible.Result = @{
                log_file = $latestLog.FullName
                last_modified = $latestLog.LastWriteTime.ToString("yyyy-MM-dd HH:mm:ss")
                recent_lines = $content
              }
            } else {
              $Ansible.Result = @{ log_file = "No log files found" }
            }
          } else {
            $Ansible.Result = @{ log_file = "Log directory not found" }
          }
      register: iis_logs

    - name: Display recent IIS log entries
      ansible.builtin.debug:
        msg: "{{ iis_logs.result }}"
